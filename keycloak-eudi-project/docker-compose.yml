services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0.0
    command: start-dev
    environment:
      KC_DB: dev-file
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"

      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin}

      # URL-ul public al verifier-ului (ngrok) — setat de build-and-deploy.sh în .env
      EUDI_VERIFIER_BASE_URL: ${EUDI_VERIFIER_BASE_URL:-}
    ports:
      - "9080:8080"
    volumes:
      - ./keycloak/providers:/opt/keycloak/providers
      - ./keycloak/data:/opt/keycloak/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/realms/master"]
      interval: 5s
      timeout: 2s
      retries: 15